name: Orca Total Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  orca-multi-scan:
    name: Orca Security Unified Scan
    runs-on: ubuntu-latest
    
    # Permissions required for some scanners to report back to GitHub
    permissions:
      contents: read
      security-events: write
      actions: read

    env:
      PROJECT_KEY: ${{ secrets.ORCA_PROJECT_KEY }} # Recommended to use a secret for your project key

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Secrets and SAST diff-awareness

      # 1. Run Orca SAST Scan (Static Analysis)
      - name: Run Orca SAST Scan
        uses: orcasecurity/shiftleft-sast-action@v1
        continue-on-error: false # Continues workflow even if vulnerabilities are found
        with:
          api_token: ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."

      # 2. Run Orca IaC Scan (Infrastructure as Code)
      - name: Run Orca IaC Scan
        uses: orcasecurity/shiftleft-iac-action@v1
        continue-on-error: false
        with:
          api_token: ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."


      # 4. Run Orca Secrets Scan
      - name: Run Orca Secrets Scan
        uses: orcasecurity/shiftleft-secrets-action@v1
        continue-on-error: false
        with:
          api_token: ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          path: "."

      # 5. Optional: Final Status Check
      # This step will summarize that scans are done even if some found issues
      - name: Scans Complete
        if: always()
        run: |
          echo "### 🛡️ Orca Security Portfolio Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "SAST, IaC, SCA, and Secrets scans have been executed." >> $GITHUB_STEP_SUMMARY
          echo "Please check the individual step logs or the Orca Dashboard for detailed findings." >> $GITHUB_STEP_SUMMARY
